{% extends 'base.html' %}
{% block title %}Add students-College Portal{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card-header bg-dark text-white">
<h5>Add New Students</h5>
        </div>
<!-- Plain HTML form -->
 <div class="card-body p-4">
 <form action="{{url_for('add_student')}}" method="POST">
    <div class ="mb-3">
    <label class="form-label">Student Name:</label>
        <input required name = "student_name" class="form-control"
         placeholder="Enter Student name" type="text">
    <div class ="mb-3">
        <label class="form-label">Marks:</label>
             <input required name = "marks" min="0" max="100" class="form-control"
              placeholder="Enter Marks" type="number">
    <div class ="mb-3">
        <label class="form-label">Roll Number: </label>
            <input required name = "roll" min="0" max="100" class="form-control"
             placeholder="Enter Roll Number" type="number"></div>
             <div class="mb-3">
                <label class="form-label">Branch</label>
                <input required name="branch" class="form-control"
                placeholder="Enter Branch of student" type="text"></div>
             </div>
        <div class ="mb-3">
        <label class="form-label">Comapny</label>
            <input required name = "Company" class="form-control"
             placeholder="Enter Comapny Name" type="text">
        <div class ="mb-3">
        <label class="form-label">Package</label>
             <input required name = "Package" class="form-control" 
             placeholder="Enter package of student" type="number">
    <div class="d-grid">
    <button type="submit" class="btn btn-dark"> Add </button>
 </form>
 </div>
    </div>
</div>
</div>
{% endblock %}
